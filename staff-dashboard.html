<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viraamam Café — Kitchen Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --obsidian: #050505;
            --obsidian-light: #0f0f0f;
            --obsidian-lighter: #1a1a1a;
            --gold: #d4af37;
            --gold-muted: rgba(212, 175, 55, 0.4);
            --gold-glass: rgba(212, 175, 55, 0.1);
            --text-main: #f5f5f5;
            --text-muted: #a3a3a3;
            
            --new: #f59e0b;
            --prep: #8b5cf6;
            --ready: #06b6d4;
            --done: #10b981;
            --danger: #ef4444;
            
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --r: 20px;
            --r-sm: 12px;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--obsidian);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.03), transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.03), transparent 35%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        button {
            font-family: inherit;
            cursor: pointer;
        }

        /* ── LOGIN ── */
        #login {
            position: fixed;
            inset: 0;
            background: var(--obsidian);
            background-image: radial-gradient(circle at center, rgba(212, 175, 55, 0.05), transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 32px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .login-box .logo {
            color: var(--gold);
            margin: 0 auto 1.5rem;
            background: var(--gold-glass);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .login-box h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-box .sub {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .lf {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .lf label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .lf input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-sm);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .lf input:focus {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.02);
        }

        .login-btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--text-main);
            color: var(--obsidian);
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            transition: var(--transition);
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .login-btn:hover {
            background: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .hint {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 1.5rem;
        }
        .hint strong { color: var(--gold); }

        /* ── TOP BAR ── */
        #topbar {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 2rem;
            height: 70px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tb-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tb-icon {
            color: var(--gold);
            width: 24px;
            height: 24px;
        }

        .tb-name {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .tb-sub {
            font-size: 0.75rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .tb-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .live-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.5); }
        }

        .tb-clock {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .tb-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .tb-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tb-btn.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* ── STATS ROW ── */
        #stats {
            background: rgba(255, 255, 255, 0.01);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.5rem 2rem;
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
        }
        
        #stats::-webkit-scrollbar { display: none; }

        .stat {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.2rem 1.5rem;
            min-width: 140px;
            flex-shrink: 0;
            text-align: center;
        }

        .stat-n {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-l {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-top: 0.4rem;
            font-weight: 500;
        }

        .stat.s-new .stat-n { color: var(--new); }
        .stat.s-prep .stat-n { color: var(--prep); }
        .stat.s-ready .stat-n { color: var(--ready); }
        .stat.s-done .stat-n { color: var(--done); text-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .stat.s-rev .stat-n { color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        /* ── KANBAN ── */
        #board {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            min-height: calc(100vh - 180px);
        }

        @media(max-width:1200px) { #board { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width:768px) { #board { grid-template-columns: 1fr; padding: 1rem; } }

        .col { display: flex; flex-direction: column; }

        .col-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .col-title {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-main);
        }

        .col-badge {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
        }

        .col-title i { width: 18px; height: 18px; }
        .col-new i { color: var(--new); }
        .col-prep i { color: var(--prep); }
        .col-ready i { color: var(--ready); }
        .col-done i { color: var(--done); }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: rgba(255, 255, 255, 0.2);
            border: 1px dashed var(--glass-border);
            border-radius: var(--r);
            background: rgba(255, 255, 255, 0.01);
        }

        .empty-i { margin-bottom: 1rem; color: rgba(255,255,255,0.15); display: flex; justify-content: center; }
        .empty p { font-size: 0.9rem; font-weight: 500; }

        /* ── ORDER CARD ── */
        .ocard {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--r);
            padding: 1.2rem;
            transition: var(--transition);
            animation: sIn .4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes sIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .ocard:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .ocard::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px;
        }

        .ocard.s-new::before { background: var(--new); box-shadow: 0 0 10px var(--new); }
        .ocard.s-confirmed::before, .ocard.s-preparing::before { background: var(--prep); box-shadow: 0 0 10px var(--prep); }
        .ocard.s-ready::before { background: var(--ready); box-shadow: 0 0 10px var(--ready); }
        .ocard.s-picked_up::before, .ocard.s-delivered::before { background: var(--done); box-shadow: 0 0 10px var(--done); }
        .ocard.s-rejected { opacity: 0.6; filter: grayscale(1); }
        .ocard.s-rejected::before { background: var(--danger); box-shadow: none; }

        .oc-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .oc-id {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            color: var(--gold);
            font-weight: 700;
        }

        .oc-ago {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .oc-customer {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .oc-customer i { width: 14px; height: 14px; color: var(--gold); }

        .oc-mode {
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 0.3rem;
            border: 1px solid var(--glass-border);
        }

        .oc-items {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            line-height: 1.6;
        }

        .oc-addr {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            padding-left: 1.6rem;
            position: relative;
            line-height: 1.4;
        }

        .oc-addr i {
            position: absolute;
            left: 0;
            top: 0.1rem;
            width: 14px;
            height: 14px;
            color: rgba(255,255,255,0.3);
        }

        .oc-total {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .oc-total i { width: 14px; height: 14px; }

        .oc-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
        }
        .oc-status i { width: 12px; height: 12px; }

        /* ACTION BUTTONS */
        .oc-actions { display: flex; flex-direction: column; gap: 0.5rem; }

        .ab {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: var(--r-sm);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .ab i { width: 16px; height: 16px; }

        .ab:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .ab:disabled { opacity: 0.4; cursor: not-allowed; }

        .ab-confirm { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .ab-confirm:hover { background: rgba(59, 130, 246, 0.25); }
        
        .ab-cook { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.3); }
        .ab-cook:hover { background: rgba(139, 92, 246, 0.25); }
        
        .ab-done { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .ab-done:hover { background: rgba(16, 185, 129, 0.25); }

        .ab-reject { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .ab-reject:hover { background: rgba(239, 68, 68, 0.15) !important; border-color: rgba(239, 68, 68, 0.3); }

        .ab-pending {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--glass-border);
            color: var(--text-muted);
            cursor: default;
        }

        .ab-pending:hover { transform: none !important; box-shadow: none !important; }

        /* TIMER BADGE (urgent if >10 min) */
        .timer-badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
        .timer-badge i { width: 12px; height: 12px; }
        .timer-badge.ok { background: rgba(16, 185, 129, 0.1); color: #34d399; }
        .timer-badge.warn { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
        .timer-badge.hot { background: rgba(239, 68, 68, 0.1); color: #f87171; animation: flash 1s infinite alternate; }

        @keyframes flash {
            from { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            to { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        }

        /* NOTIFICATIONS */
        #notifs { position: fixed; top: 85px; right: 2rem; z-index: 500; display: flex; flex-direction: column; gap: 0.8rem; pointer-events: none; }

        .notif {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 1.2rem;
            min-width: 320px;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            animation: nIn .4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        @keyframes nIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        .notif.n-new { border-color: rgba(245, 158, 11, 0.4); }
        .notif.n-rider { border-color: rgba(16, 185, 129, 0.4); }

        .notif-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); color: var(--gold); flex-shrink: 0;
        }

        .notif-title { font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem; }
        .notif-sub { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }

        /* TOAST */
        #toasts { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.6rem; align-items: center; pointer-events: none; }
        .toast {
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 0.8rem 1.8rem; border-radius: 50px; font-size: 0.9rem; font-weight: 500;
            animation: tIn .3s ease; display: flex; align-items: center; gap: 0.5rem;
        }
        @keyframes tIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .toast.ok { border-color: rgba(16, 185, 129, 0.3); color: #34d399; }
        .toast.err { border-color: rgba(239, 68, 68, 0.3); color: #f87171; }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login">
        <div class="login-box">
            <div class="logo"><i data-lucide="chef-hat" style="width:32px;height:32px"></i></div>
            <h1>Kitchen Panel</h1>
            <div class="sub">Viraamam Café — Staff Access</div>
            <div class="lf"><label>Staff ID</label><input type="text" id="lu" placeholder="staff1" value="staff1"></div>
            <div class="lf"><label>Password</label><input type="password" id="lp" placeholder="••••••••" value="kitchen123" onkeydown="if(event.key==='Enter')doLogin()"></div>
            <button class="login-btn" onclick="doLogin()">Authorize Access <i data-lucide="arrow-right"></i></button>
            <p class="hint">Demo: <strong>staff1 / kitchen123</strong></p>
        </div>
    </div>

    <!-- TOP BAR -->
    <div id="topbar" style="display:none">
        <div class="tb-brand">
            <i data-lucide="coffee" class="tb-icon"></i>
            <div>
                <div class="tb-name">Viraamam Café</div>
                <div class="tb-sub">Kitchen Command Center</div>
            </div>
        </div>
        <div class="tb-right">
            <div class="live-badge"><span class="live-dot"></span><span style="padding-top:2px">Live Sync</span></div>
            <span class="tb-clock" id="clock">—</span>
            <button class="tb-btn" onclick="seedDemo()"><i data-lucide="plus"></i> Demo Order</button>
            <button class="tb-btn danger" onclick="doLogout()"><i data-lucide="log-out"></i> End Shift</button>
        </div>
    </div>

    <!-- STATS -->
    <div id="stats" style="display:none">
        <div class="stat s-new"><div class="stat-n" id="sn-new">0</div><div class="stat-l">Inbox</div></div>
        <div class="stat s-prep"><div class="stat-n" id="sn-prep">0</div><div class="stat-l">On Line</div></div>
        <div class="stat s-ready"><div class="stat-n" id="sn-ready">0</div><div class="stat-l">Pending Pickup</div></div>
        <div class="stat s-done"><div class="stat-n" id="sn-done">0</div><div class="stat-l">Completed Today</div></div>
        <div class="stat s-rev"><div class="stat-n" id="sn-rev">₹0</div><div class="stat-l">Revenue Matrix</div></div>
    </div>

    <!-- BOARD -->
    <div id="board" style="display:none">
        <div class="col col-new">
            <div class="col-hdr">
                <div class="col-title"><i data-lucide="inbox"></i> New Orders</div>
                <span class="col-badge" id="cb-new">0</span>
            </div>
            <div class="cards" id="col-new"></div>
        </div>
        <div class="col col-prep">
            <div class="col-hdr">
                <div class="col-title"><i data-lucide="flame"></i> Preparing</div>
                <span class="col-badge" id="cb-prep">0</span>
            </div>
            <div class="cards" id="col-prep"></div>
        </div>
        <div class="col col-ready">
            <div class="col-hdr">
                <div class="col-title"><i data-lucide="package-check"></i> Ready</div>
                <span class="col-badge" id="cb-ready">0</span>
            </div>
            <div class="cards" id="col-ready"></div>
        </div>
        <div class="col col-done">
            <div class="col-hdr">
                <div class="col-title"><i data-lucide="check-circle-2"></i> Dispatched</div>
                <span class="col-badge" id="cb-done">0</span>
            </div>
            <div class="cards" id="col-done"></div>
        </div>
    </div>

    <div id="notifs"></div>
    <div id="toasts"></div>

    <script>
        lucide.createIcons();
        // ══════════════════════════════════════════════
        // SYNC ENGINE
        // ══════════════════════════════════════════════
        const DB = 'viraamam_orders', CH = 'viraamam_sync';
        let bc, loggedIn = false;

        function getOrders() { try { return JSON.parse(localStorage.getItem(DB) || '[]'); } catch { return []; } }
        function saveOrders(o) { localStorage.setItem(DB, JSON.stringify(o)); }
        function updOrder(id, status, extra = {}) {
            const orders = getOrders(), i = orders.findIndex(o => o.id === id);
            if (i === -1) return null;
            orders[i] = { ...orders[i], status, updatedAt: new Date().toISOString(), ...extra };
            saveOrders(orders); bc.postMessage({ type: 'ORDER_UPDATED', payload: orders[i] });
            return orders[i];
        }

        // ══════════════════════════════════════════════
        // AUTH
        // ══════════════════════════════════════════════
        function doLogin() {
            const u = document.getElementById('lu').value.trim(), p = document.getElementById('lp').value.trim();
            if ((u === 'staff1' || u === 'staff2') && p === 'kitchen123') {
                loggedIn = true;
                document.getElementById('login').style.display = 'none';
                ['topbar', 'stats', 'board'].forEach(id => document.getElementById(id).style.display = '');
                document.getElementById('board').style.display = 'grid';
                init();
            } else {
                shake(document.querySelector('.login-box'));
                toast('Invalid credentials', 'err', 'shield-alert');
            }
        }
        function doLogout() {
            loggedIn = false;
            document.getElementById('login').style.display = 'flex';
            ['topbar', 'stats', 'board'].forEach(id => document.getElementById(id).style.display = 'none');
        }
        function shake(el) { el.style.animation = ''; void el.offsetWidth; el.style.animation = 'shake .4s Math.ease'; setTimeout(() => el.style.animation = '', 400); }
        const style = document.createElement('style'); style.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}'; document.head.appendChild(style);

        // ══════════════════════════════════════════════
        // CLOCK
        // ══════════════════════════════════════════════
        function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
        setInterval(tick, 1000); tick();

        // ══════════════════════════════════════════════
        // HELPERS
        // ══════════════════════════════════════════════
        function ago(iso) {
            const d = Math.floor((Date.now() - new Date(iso)) / 1000);
            if (d < 60) return d + 's ago'; if (d < 3600) return Math.floor(d / 60) + 'm ago'; return Math.floor(d / 3600) + 'h ago';
        }
        function minAgo(iso) { return Math.floor((Date.now() - new Date(iso)) / 60000); }
        function timerBadge(iso) {
            const m = minAgo(iso);
            if (m < 8) return `<span class="timer-badge ok"><i data-lucide="clock"></i> ${m}m</span>`;
            if (m < 15) return `<span class="timer-badge warn"><i data-lucide="alert-circle"></i> ${m}m</span>`;
            return `<span class="timer-badge hot"><i data-lucide="flame"></i> ${m}m</span>`;
        }
        const SM = {
            new: { label: 'Awaiting', color: '#f59e0b', bg: 'rgba(245,158,11,.15)', icon: 'inbox' },
            confirmed: { label: 'Confirmed', color: '#3b82f6', bg: 'rgba(59,130,246,.15)', icon: 'thumbs-up' },
            preparing: { label: 'Fired', color: '#8b5cf6', bg: 'rgba(139,92,246,.15)', icon: 'flame' },
            ready: { label: 'Ready', color: '#06b6d4', bg: 'rgba(6,182,212,.15)', icon: 'package-check' },
            picked_up: { label: 'In Transit', color: '#f97316', bg: 'rgba(249,115,22,.15)', icon: 'bike' },
            delivered: { label: 'Completed', color: '#10b981', bg: 'rgba(16,185,129,.15)', icon: 'check-circle-2' },
            rejected: { label: 'Cancelled', color: '#ef4444', bg: 'rgba(239,68,68,.15)', icon: 'x-circle' },
        };

        // ══════════════════════════════════════════════
        // RENDER CARD
        // ══════════════════════════════════════════════
        function renderCard(o) {
            const s = SM[o.status] || SM.new;
            const items = (o.items || []).map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:0.2rem"><span><span style="color:var(--gold);font-weight:600">${i.qty}×</span> ${i.name}</span></div>`).join('');
            const total = o.total ? `<i data-lucide="receipt"></i> ₹${o.total}` : '';
            let actions = '';
            if (o.status === 'new') {
                actions = `<button class="ab ab-confirm" onclick="act('${o.id}','confirmed')"><i data-lucide="check-circle"></i> Accept Ticket</button>
             <button class="ab ab-reject" onclick="rej('${o.id}')"><i data-lucide="x"></i> Decline</button>`;
            } else if (o.status === 'confirmed') {
                actions = `<button class="ab ab-cook" onclick="act('${o.id}','preparing')"><i data-lucide="flame"></i> Fire Ticket</button>`;
            } else if (o.status === 'preparing') {
                actions = `<button class="ab ab-done" onclick="act('${o.id}','ready')"><i data-lucide="package-check"></i> Mark Ready</button>`;
            } else if (o.status === 'ready') {
                actions = `<div class="ab ab-pending"><i data-lucide="loader-2" class="spin"></i> Awaiting Rider...</div>`;
            } else if (o.status === 'picked_up') {
                actions = `<div class="ab ab-pending"><i data-lucide="bike"></i> En Route (${o.rider || 'Agent'})</div>`;
            } else if (o.status === 'delivered') {
                actions = `<div class="ab ab-pending" style="color:var(--done); border-color:rgba(16,185,129,0.2)"><i data-lucide="check-circle-2"></i> Fulfilled</div>`;
            }
            return `<div class="ocard s-${o.status}" id="oc-${o.id}">
    <div class="oc-head">
      <span class="oc-id">${o.id.substring(0, 12)}</span>
      <span class="oc-ago">${ago(o.createdAt)} ${timerBadge(o.createdAt)}</span>
    </div>
    <div class="oc-customer">
      <i data-lucide="user"></i> ${o.customerName || 'Guest'}
      <span class="oc-mode">${o.mode || 'Delivery'}</span>
      ${o.phone ? `<span style="font-size:0.7rem;color:var(--text-muted);font-weight:400;margin-left:auto">${o.phone}</span>` : ''}
    </div>
    <div class="oc-items">${items || '—'}</div>
    ${o.address ? `<div class="oc-addr"><i data-lucide="map-pin"></i> ${o.address}</div>` : ''}
    ${total ? `<div class="oc-total">${total}</div>` : ''}
    <span class="oc-status" style="color:${s.color};background:${s.bg};"><i data-lucide="${s.icon}"></i> ${s.label}</span>
    <div class="oc-actions">${actions}</div>
  </div>`;
        }

        // ══════════════════════════════════════════════
        // RENDER ALL
        // ══════════════════════════════════════════════
        function renderAll() {
            if (!loggedIn) return;
            const orders = getOrders();
            const today = new Date().toDateString();

            const cols = { new: [], prep: [], ready: [], done: [] };
            let rev = 0;
            orders.forEach(o => {
                if (o.status === 'new' || o.status === 'confirmed') cols.new.push(o);
                else if (o.status === 'preparing') cols.prep.push(o);
                else if (o.status === 'ready') cols.ready.push(o);
                else if ((o.status === 'picked_up' || o.status === 'delivered') && new Date(o.updatedAt || o.createdAt).toDateString() === today) {
                    cols.done.push(o);
                    if (o.status === 'delivered') rev += o.total || 0;
                }
            });

            const todayDel = orders.filter(o => o.status === 'delivered' && new Date(o.updatedAt).toDateString() === today).length;
            document.getElementById('sn-new').textContent = cols.new.length;
            document.getElementById('sn-prep').textContent = cols.prep.length;
            document.getElementById('sn-ready').textContent = cols.ready.length;
            document.getElementById('sn-done').textContent = todayDel;
            document.getElementById('sn-rev').textContent = '₹' + rev;

            const map = { new: 'col-new', prep: 'col-prep', ready: 'col-ready', done: 'col-done' };
            const cntMap = { new: 'cb-new', prep: 'cb-prep', ready: 'cb-ready', done: 'cb-done' };
            const empties = { new: 'Inbox Zero', prep: 'Kitchen Clear', ready: 'No pending dispersals', done: 'Awaiting fulfillments' };
            const emptyIcons = { new: 'inbox', prep: 'coffee', ready: 'package-open', done: 'layout-list' };
            Object.entries(cols).forEach(([k, list]) => {
                document.getElementById(cntMap[k]).textContent = list.length;
                const el = document.getElementById(map[k]);
                el.innerHTML = list.length ? list.map(renderCard).join('') : `<div class="empty"><div class="empty-i"><i data-lucide="${emptyIcons[k]}" style="width:36px;height:36px"></i></div><p>${empties[k]}</p></div>`;
            });
            lucide.createIcons(); // re-init icons for newly added DOM
        }

        // ══════════════════════════════════════════════
        // ACTIONS
        // ══════════════════════════════════════════════
        const ACT_LABELS = { confirmed: 'Order Confirmed', preparing: 'Kitchen Fired', ready: 'Ready for Dispatch' };
        function act(id, status) {
            const o = updOrder(id, status);
            if (o) { toast(ACT_LABELS[status] || status, 'ok', 'check-circle'); }
            renderAll();
        }
        function rej(id) {
            if (!confirm('Reject this order? The customer will be informed.')) return;
            const orders = getOrders(), i = orders.findIndex(o => o.id === id);
            if (i === -1) return;
            orders[i] = { ...orders[i], status: 'rejected', updatedAt: new Date().toISOString() };
            saveOrders(orders); bc.postMessage({ type: 'ORDER_UPDATED', payload: orders[i] });
            toast('Ticket voided', 'err', 'x-circle'); renderAll();
        }

        // ══════════════════════════════════════════════
        // NOTIFICATIONS
        // ══════════════════════════════════════════════
        function notify(title, sub, type = '') {
            const stack = document.getElementById('notifs');
            const el = document.createElement('div'); el.className = `notif n-${type}`;
            const iconName = type === 'new' ? 'bell-ring' : type === 'rider' ? 'bike' : 'info';
            el.innerHTML = `<div class="notif-icon"><i data-lucide="${iconName}"></i></div><div><div class="notif-title">${title}</div><div class="notif-sub">${sub}</div></div>`;
            stack.appendChild(el);
            lucide.createIcons({root: el});
            beep(type === 'new' ? 880 : 660);
            setTimeout(() => { el.style.transition = 'opacity .4s, transform .4s'; el.style.opacity = '0'; el.style.transform = 'translateY(-10px)'; setTimeout(() => el.remove(), 400); }, 5000);
        }
        function beep(f = 880) {
            try { const a = new (window.AudioContext || window.webkitAudioContext)(); const o = a.createOscillator(); const g = a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value = f; g.gain.setValueAtTime(.1, a.currentTime); g.gain.exponentialRampToValueAtTime(.001, a.currentTime + .3); o.start(); o.stop(a.currentTime + .3); } catch { }
        }

        // ══════════════════════════════════════════════
        // TOAST
        // ══════════════════════════════════════════════
        function toast(msg, type = '', iconName='info') {
            const el = document.createElement('div'); el.className = 'toast' + (type ? ' ' + type : '');
            el.innerHTML = `<i data-lucide="${iconName}"></i> <span>${msg}</span>`;
            document.getElementById('toasts').appendChild(el);
            lucide.createIcons({root: el});
            setTimeout(() => { el.style.transition = 'opacity .4s, transform .4s'; el.style.opacity = '0'; el.style.transform='translateY(10px) translateX(-50%)'; setTimeout(() => el.remove(), 400); }, 3000);
        }

        // ══════════════════════════════════════════════
        // SEED DEMO
        // ══════════════════════════════════════════════
        function seedDemo() {
            const demos = [
                { customerName: 'Priya Sharma', phone: '9876543210', items: [{ name: 'Artisan Margherita Pizza', qty: 1 }, { name: 'Truffle Fries', qty: 2 }], total: 670, address: 'The Residences, Tower B, Chennai', mode: 'Delivery' },
                { customerName: 'Arjun Reddy', phone: '9845678901', items: [{ name: 'Gourmet Cheese Burger', qty: 2 }, { name: 'Matcha Frappe', qty: 2 }], total: 856, address: 'Tech Park Blvd, Sholinganallur', mode: 'Delivery' },
                { customerName: 'Seetha Lakshmi', phone: '9765432109', items: [{ name: 'Signature Gold Leaf Mocha', qty: 2 }], total: 590, address: 'VIP Lounge – Table 04', mode: 'Dine-In' },
            ];
            const d = demos[Math.floor(Math.random() * demos.length)];
            const orders = getOrders();
            const o = { ...d, id: 'VC-' + Date.now().toString().substring(5), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), status: 'new' };
            orders.unshift(o); saveOrders(orders);
            bc.postMessage({ type: 'ORDER_CREATED', payload: o });
            notify('Incoming Ticket', o.id + ' · ' + o.customerName, 'new');
            renderAll();
        }

        // ══════════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════════
        function init() {
            bc = new BroadcastChannel(CH);
            bc.onmessage = (e) => {
                const { type, payload } = e.data;
                if (type === 'ORDER_CREATED') {
                    notify('System Alert', `New order ${payload.id} received from ${payload.customerName || 'Guest'}.`, 'new');
                }
                if (type === 'ORDER_UPDATED' && (payload.status === 'picked_up' || payload.status === 'delivered')) {
                    notify('Dispatch Update', `${payload.id} — ${payload.status === 'picked_up' ? 'En Route with ' + (payload.rider || 'Agent') : 'Successfully Fulfilled'}`, 'rider');
                }
                renderAll();
            };
            renderAll();
            setInterval(renderAll, 15000);
        }
        
        // CSS for spinning icon
        const spinStyle = document.createElement('style');
        spinStyle.textContent = '@keyframes spin { 100% { transform:rotate(360deg); } } .spin { animation: spin 2s linear infinite; }';
        document.head.appendChild(spinStyle);
    </script>
</body>

</html>
